---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: trust-manager
      version: v0.23.0
      sourceRef:
        kind: HelmRepository
        name: jetstack-charts
        namespace: flux-system
      interval: 5m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    replicaCount: 3
    app:
      trust:
        namespace: networking
    # Allow trust-manager to write Bundles into Secrets (default is ConfigMap
    # only). Required so kamaji's PostgreSQL DataStore can reference a public CA
    # bundle via secretReference. The allowlist scopes which Secret names it may
    # manage across namespaces.
    secretTargets:
      enabled: true
      authorizedSecrets:
        - kamaji-neon-ca-bundle
