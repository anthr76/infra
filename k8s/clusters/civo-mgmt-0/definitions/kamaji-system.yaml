---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kamaji-system
  namespace: flux-system
  labels:
    component.kutara.io/part-of: definitions
spec:
  path: "./k8s/base/kamaji-system"
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kamaji-system-kamaji
  namespace: flux-system
  labels:
    component.kutara.io/part-of: definitions
spec:
  path: "./k8s/base/kamaji-system/kamaji"
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kamaji-system-datastore
  namespace: flux-system
  labels:
    component.kutara.io/part-of: definitions
spec:
  dependsOn:
    - name: kamaji-system-kamaji
  path: "./k8s/base/kamaji-system/datastore"
  prune: true
